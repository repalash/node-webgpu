name: Build cross platform

permissions:
  contents: write

# Controls when the action will run. Triggers the workflow on push
on:
  push:
    branches:
      - '**' # Triggers on pushes to any branch
    tags:
      - 'v*' # Triggers on pushes of tags like v1.0, v20.15.10
  pull_request:

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
        # TEMP: non-Alpine builds commented out while iterating on Alpine CI.
        # - {
        #     name: "Windows Latest MSVC",
        #     os: windows-latest,
        #     artifact: win32-x64,
        #   }
        # - {
        #     name: "Ubuntu_22_GCC",
        #     os: ubuntu-22.04,
        #     artifact: linux-x64,
        #   }
        # - {
        #     name: "Ubuntu_24_ARM64",
        #     os: ubuntu-24.04-arm,
        #     artifact: linux-arm64,
        #   }
        - {
            name: "Alpine_X64",
            os: ubuntu-22.04,
            artifact: linux-x64-musl,
            alpine: true,
          }
        - {
            name: "Alpine_ARM64",
            os: ubuntu-24.04-arm,
            artifact: linux-arm64-musl,
            alpine: true,
          }
        # - {
        #     name: "macOS Latest Clang",
        #     os: macos-latest,
        #     artifact: darwin-universal,
        #   }

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Use Node.js
        if: ${{ !matrix.config.alpine }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use Go
        if: ${{ !matrix.config.alpine }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.3'

      - name: Print env
        run: |
          echo github.event.action: ${{ github.event.action }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref: ${{ github.ref }}

      - name: Install dependencies on windows
        if: startsWith(matrix.config.os, 'windows')
        run: |
          choco install node cmake
          node --version
          cmake --version
          "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"

      - name: Add msbuild to PATH
        if: startsWith(matrix.config.os, 'windows')
        uses: microsoft/setup-msbuild@v2

      - name: Add setup Windows SDK
        if: startsWith(matrix.config.os, 'windows')
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2
        with:
          sdk-version: 26100

      - name: Install dependencies on ubuntu
        if: startsWith(matrix.config.name, 'Ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install cmake libxrandr-dev libxinerama-dev libxcursor-dev mesa-common-dev libx11-xcb-dev pkg-config nodejs npm mesa-vulkan-drivers libvulkan1
          cmake --version
          gcc --version

      - name: Install dependencies on macos
        if: startsWith(matrix.config.os, 'macos')
        run: |
          brew install cmake
          cmake --version

      - name: Build (Alpine via Docker)
        if: ${{ matrix.config.alpine }}
        run: |
          # Runs the build inside alpine:3.23. Docker pulls the image matching
          # the host arch (linux/amd64 on ubuntu-22.04, linux/arm64 on
          # ubuntu-24.04-arm) so the resulting dawn.node is native to the host.
          docker run --rm \
            -v "$PWD:/work" -w /work \
            -e VPYTHON_BYPASS="manually managed python not supported by chrome operations" \
            -e DEPOT_TOOLS_UPDATE=0 \
            -e DEPOT_TOOLS_WIN_TOOLCHAIN=0 \
            alpine:3.23 \
            sh -e <<'DOCKER_EOF'
              apk add --no-cache \
                build-base cmake ninja-build go nodejs npm \
                python3 py3-pip py3-httplib2 \
                libxrandr-dev libxinerama-dev libxcursor-dev mesa-dev \
                libx11-dev libxcb-dev pkgconf git bash \
                mesa-vulkan-swrast vulkan-loader

              # Alpine's py3-httplib2 package is missing the socks submodule.
              # depot_tools imports it; shim via PySocks.
              pip3 install --break-system-packages PySocks
              PY_SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
              printf 'from socks import *\n' > "$PY_SITE/httplib2/socks.py"

              # Alpine puts ninja under /usr/lib/ninja-build/bin, not on PATH by default.
              export PATH=/usr/lib/ninja-build/bin:$PATH

              # Repo was cloned by the host user; allow git inside the container.
              git config --global --add safe.directory /work
              git config --global --add safe.directory '*'

              cmake --version
              gcc --version
              node --version
              go version

              npm ci

              # Initialize submodules up-front so we can patch depot_tools
              # before gclient sync runs.
              git submodule update --init

              # git >= 2.52 rejects `git config --local` outside a work tree.
              # gclient's set_config decorator triggers this during sync. The
              # decorator only writes advisory local configs (blame.ignoreRevsFile,
              # fetch.recurseSubmodules=off, etc.) — safe to disable for a CI build.
              sed -i 's/^    @set_config$//' third_party/depot_tools/gclient_scm.py

              npm run build
          DOCKER_EOF

      - name: Build
        if: ${{ !matrix.config.alpine }}
        shell: bash
        run: |
          npm ci
          echo "${{ github.event_name }}"
          npm run build

      - name: Test
        if: ${{ !matrix.config.alpine }}
        shell: bash
        env:
          WEBGPU_USE_CI_AVAILABLE_RENDERER: "1"
        run: |
          npm test

      - name: Upload Artifact ⬆️
        uses: actions/upload-artifact@v4
        with:
          path: ./dist/*.dawn.node
          name: ${{ matrix.config.artifact }}.dawn.node
          overwrite: true

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.dawn.node

  package:
    needs: build
    name: package-and-publish
    environment: deploy
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Print env
      run: |
        echo github.event.action: ${{ github.event.action }}
        echo github.event_name: ${{ github.event_name }}
        echo github.ref: ${{ github.ref }}
        echo github.ref_type: ${{ github.ref_type }}

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Build and Publish
      shell: bash
      run: |
        npm ci
        node build/prep-for-publish.js
        npm publish
