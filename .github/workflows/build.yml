name: Build cross platform

permissions:
  contents: write

# Controls when the action will run. Triggers the workflow on push
on:
  push:
    branches:
      - '**' # Triggers on pushes to any branch
    tags:
      - 'v*' # Triggers on pushes of tags like v1.0, v20.15.10
  pull_request:

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Windows Latest MSVC",
            os: windows-latest,
            artifact: win32-x64,
          }
        - {
            name: "Ubuntu_22_GCC",
            os: ubuntu-22.04,
            artifact: linux-x64,
          }
        - {
            name: "Ubuntu_24_ARM64",
            os: ubuntu-24.04-arm,
            artifact: linux-arm64,
          }
        - {
            name: "Alpine_X64",
            os: ubuntu-22.04,
            artifact: linux-x64-musl,
            alpine: true,
            arch: x86_64,
          }
        - {
            name: "Alpine_ARM64",
            os: ubuntu-24.04-arm,
            artifact: linux-arm64-musl,
            alpine: true,
            arch: aarch64,
          }
        - {
            name: "macOS Latest Clang",
            os: macos-latest,
            artifact: darwin-universal,
          }

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Use Node.js
        if: ${{ !matrix.config.alpine }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use Go
        if: ${{ !matrix.config.alpine }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.3'

      - name: Print env
        run: |
          echo github.event.action: ${{ github.event.action }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref: ${{ github.ref }}

      - name: Install dependencies on windows
        if: startsWith(matrix.config.os, 'windows')
        run: |
          choco install node cmake
          node --version
          cmake --version
          "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"

      - name: Add msbuild to PATH
        if: startsWith(matrix.config.os, 'windows')
        uses: microsoft/setup-msbuild@v2

      - name: Add setup Windows SDK
        if: startsWith(matrix.config.os, 'windows')
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2
        with:
          sdk-version: 26100

      - name: Install dependencies on ubuntu
        if: startsWith(matrix.config.name, 'Ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install cmake libxrandr-dev libxinerama-dev libxcursor-dev mesa-common-dev libx11-xcb-dev pkg-config nodejs npm mesa-vulkan-drivers libvulkan1
          cmake --version
          gcc --version

      - name: Install dependencies on macos
        if: startsWith(matrix.config.os, 'macos')
        run: |
          brew install cmake
          cmake --version

      - name: Set up Alpine chroot
        if: ${{ matrix.config.alpine }}
        uses: jirutka/setup-alpine@v1
        with:
          branch: v3.23
          arch: ${{ matrix.config.arch }}
          packages: >
            build-base cmake ninja-build go nodejs npm python3 py3-httplib2
            libxrandr-dev libxinerama-dev libxcursor-dev mesa-dev
            libx11-dev libxcb-dev pkgconf git bash
            mesa-vulkan-swrast vulkan-loader

      - name: Install Alpine build prerequisites
        if: ${{ matrix.config.alpine }}
        shell: alpine.sh --root {0}
        run: |
          # depot_tools bundles a glibc python; force system python via VPYTHON_BYPASS (set at build time).
          # Alpine's httplib2 package is missing the socks submodule — install PySocks and shim it.
          pip3 install --break-system-packages PySocks || pip3 install --break-system-packages --user PySocks
          PY_SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          printf 'from socks import *\n' > "$PY_SITE/httplib2/socks.py"

          # Ninja is installed to a non-standard path on Alpine.
          echo 'export PATH=/usr/lib/ninja-build/bin:$PATH' >> /etc/profile.d/ninja.sh

          cmake --version
          gcc --version
          node --version
          go version

      - name: Build (Alpine)
        if: ${{ matrix.config.alpine }}
        shell: alpine.sh {0}
        env:
          VPYTHON_BYPASS: "manually managed python not supported by chrome operations"
          DEPOT_TOOLS_UPDATE: "0"
          DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
        run: |
          export PATH=/usr/lib/ninja-build/bin:$PATH

          npm ci

          # Initialize submodules up-front so we can patch depot_tools
          # before gclient sync runs.
          git submodule update --init

          # git >= 2.52 rejects `git config --local` outside a work tree.
          # gclient's post-checkout config decorator hits this on fresh clones.
          # Make the failure non-fatal so gclient sync can proceed.
          GCLIENT_SCM=third_party/depot_tools/gclient_scm.py
          if [ -f "$GCLIENT_SCM" ] && grep -q "fetch.recurseSubmodules" "$GCLIENT_SCM"; then
            python3 - "$GCLIENT_SCM" <<'PY'
          import re, sys
          fn = sys.argv[1]
          src = open(fn).read()
          marker = "git -c color.ui=never config --local"
          if "_GCLIENT_ALPINE_PATCH_APPLIED" in src or marker not in src:
              print("gclient_scm.py: no patch needed or structure changed; leaving unchanged")
              sys.exit(0)
          # Wrap every call to _run_config* in try/except so local-config failures don't abort sync.
          patched = src.replace(
              "def _CheckSafeForGitConfigCall(",
              "# _GCLIENT_ALPINE_PATCH_APPLIED\ndef _CheckSafeForGitConfigCall(",
          )
          patched = re.sub(
              r"(subprocess2\.check_call\(\['git',\s*'-c',\s*'color\.ui=never',\s*'config',\s*'--local',[^\)]*\]\s*,[^\)]*\))",
              r"try:\n    \1\nexcept Exception as _e:\n    import logging; logging.warning('git config --local failed (non-fatal): %s', _e)",
              patched,
          )
          if patched == src:
              print("gclient_scm.py: pattern not matched; build may fail on git config step")
              sys.exit(0)
          open(fn, "w").write(patched)
          print("gclient_scm.py: patched local-config calls")
          PY
          fi

          npm run build

      - name: Build
        if: ${{ !matrix.config.alpine }}
        shell: bash
        run: |
          npm ci
          echo "${{ github.event_name }}"
          npm run build

      - name: Test (Alpine)
        if: ${{ matrix.config.alpine }}
        shell: alpine.sh {0}
        env:
          WEBGPU_USE_CI_AVAILABLE_RENDERER: "1"
        run: |
          npm test

      - name: Test
        if: ${{ !matrix.config.alpine }}
        shell: bash
        env:
          WEBGPU_USE_CI_AVAILABLE_RENDERER: "1"
        run: |
          npm test

      - name: Upload Artifact ⬆️
        uses: actions/upload-artifact@v4
        with:
          path: ./dist/*.dawn.node
          name: ${{ matrix.config.artifact }}.dawn.node
          overwrite: true

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.dawn.node

  package:
    needs: build
    name: package-and-publish
    environment: deploy
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Print env
      run: |
        echo github.event.action: ${{ github.event.action }}
        echo github.event_name: ${{ github.event_name }}
        echo github.ref: ${{ github.ref }}
        echo github.ref_type: ${{ github.ref_type }}

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Build and Publish
      shell: bash
      run: |
        npm ci
        node build/prep-for-publish.js
        npm publish
